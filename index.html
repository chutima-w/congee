          <div class="ev-field"><label>จำนวนชามที่ขายได้</label><input id="ef-bowls" type="number" min="0" step="1" value="${draft.bowlsSold}" placeholder="0"></div>
        </div>
        <div class="ev-row2">
          <div class="ev-field"><label>รับเป็นเงินสด (บาท)</label><input id="ef-cash" type="number" min="0" step="0.01" value="${draft.cashRevenue}" placeholder="0.00"></div>
          <div class="ev-field"><label>รับเป็นเงินโอน (บาท)</label><input id="ef-transfer" type="number" min="0" step="0.01" value="${draft.transferRevenue}" placeholder="0.00"></div>
        </div>
        <div class="ev-revenue-total">ยอดขายรวม: <b>฿${fmtMoney(c.cash+c.transfer)}</b></div>
        <div class="ev-field"><label>หมายเหตุ</label><textarea id="ef-note" placeholder="รายละเอียดเพิ่มเติม">${escapeHtml(draft.note)}</textarea></div>

        <h3>วัตถุดิบประกอบอาหาร</h3>
        <div class="ev-hint">ซื้อเป็นรอบๆ ไม่ปนกับรอบอื่น — ระบุจำนวนที่ใช้และราคาที่จ่ายจริงในรอบนี้</div>
        <div id="ef-ing-list">
          ${draft.rawIngredients.map(i=>`
            <div class="ev-ing-row" data-ing-item="${i.id}">
              <span class="ev-ing-name"><input data-ing-name="${i.id}" value="${escapeHtml(i.name)}" placeholder="ชื่อวัตถุดิบ"></span>
              <span class="ev-ing-qty"><input type="number" min="0" step="0.01" data-ing-qty="${i.id}" value="${i.quantity}" placeholder="จำนวน"></span>
              <span class="ev-ing-unit"><input data-ing-unit="${i.id}" value="${escapeHtml(i.unit||'')}" placeholder="หน่วย"></span>
              <span class="ev-ing-price"><input type="number" min="0" step="0.01" data-ing-price="${i.id}" value="${i.price}" placeholder="ราคา"></span>
              <button class="ev-usage-del" data-ing-del="${i.id}" title="ลบ">${iconTrash()}</button>
            </div>
          `).join('')}
        </div>
        <button type="button" class="ev-mini-add" id="ef-add-ing">+ เพิ่มวัตถุดิบอื่น</button>

        <h3>วัตถุดิบจาก Supplies</h3>
        <div class="ev-hint">รายการ "ผันแปรตามชาม" คำนวณอัตโนมัติจากจำนวนชาม แก้ตัวเลขเองได้ถ้าต้องการ</div>
        <div id="ef-usage-list">
          ${activeUsage.length===0?'<div style="font-size:12.5px;color:var(--ink-soft);padding:6px 0;">ยังไม่มีรายการวัตถุดิบ</div>':activeUsage.map(usageRowHtml).join('')}
        </div>
        ${availableToAdd.length>0?`
        <select id="ef-add-item" style="margin-top:8px;width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;">
          <option value="">+ เลือกวัตถุดิบเพิ่ม...</option>
          ${availableToAdd.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}
        </select>
        `:''}

        <h3>ค่าใช้จ่ายอื่นๆ</h3>
        <div class="ev-hint">เช่น ค่าแรง ค่าเดินทาง ค่าเช่าที่ (ไม่รวมวัตถุดิบ)</div>
        <div id="ef-cost-list">
          ${draft.otherCosts.length===0?'<div style="font-size:12.5px;color:var(--ink-soft);padding:6px 0;">ยังไม่มีรายการ</div>':draft.otherCosts.map(c=>`
            <div class="ev-cost-row" data-cost-item="${c.id}">
              <span class="ev-cost-desc"><input data-cost-desc="${c.id}" value="${escapeHtml(c.description)}" placeholder="รายการ"></span>
              <span class="ev-cost-amt"><input type="number" min="0" step="0.01" data-cost-amt="${c.id}" value="${c.amount}" placeholder="0.00"></span>
              <button class="ev-usage-del" data-cost-del="${c.id}" title="ลบ">${iconTrash()}</button>
            </div>
          `).join('')}
        </div>
        <button type="button" class="ev-mini-add" id="ef-add-cost">+ เพิ่มค่าใช้จ่าย</button>

        <div class="ev-summary">
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบประกอบอาหาร</span><span class="val">฿${fmtMoney(c.ingredientsCost)}</span></div>
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบจาก Supplies</span><span class="val">฿${fmtMoney(c.suppliesCost)}</span></div>
          <div class="ev-summary-row"><span>ค่าใช้จ่ายอื่นๆ</span><span class="val">฿${fmtMoney(c.otherCost)}</span></div>
          <div class="ev-summary-row"><span>รายได้รวม (สด ฿${fmtMoney(c.cash)} + โอน ฿${fmtMoney(c.transfer)})</span><span class="val">฿${fmtMoney(c.revenue)}</span></div>
          <div class="ev-summary-total"><span>กำไรสุทธิ (ประมาณการ)</span><span class="val">฿${fmtMoney(c.profit)}</span></div>
          <div class="ev-summary-split">${partners.map(p=>`${escapeHtml(p.name)}: ฿${fmtMoney(c.profit*p.share/100)} (${p.share}%)`).join(' · ')}</div>
        </div>

        <div class="ev-modal-actions">
          <button class="ev-btn-secondary" id="ef-cancel">ยกเลิก</button>
          ${e?`<button class="ev-btn-danger" id="ef-delete" style="flex:0 0 auto;">${iconTrash()} ลบร่าง</button>`:''}
          <button class="ev-btn-primary" id="ef-save">บันทึกร่าง</button>
          <button class="ev-btn-close" id="ef-close-round">${iconCheck()} ปิดรอบขายนี้</button>
        </div>
      `;
    }

    function captureDraft(box){
      draft.name = box.querySelector('#ef-name').value;
      draft.date = box.querySelector('#ef-date').value;
      draft.note = box.querySelector('#ef-note').value;
      draft.bowlsSold = box.querySelector('#ef-bowls').value;
      draft.cashRevenue = box.querySelector('#ef-cash').value;
      draft.transferRevenue = box.querySelector('#ef-transfer').value;
      box.querySelectorAll('[data-ing-name]').forEach(inp=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingName);
        if(row) row.name = inp.value;
      });
      box.querySelectorAll('[data-ing-qty]').forEach(inp=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingQty);
        if(row) row.quantity = inp.value;
      });
      box.querySelectorAll('[data-ing-unit]').forEach(inp=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingUnit);
        if(row) row.unit = inp.value;
      });
      box.querySelectorAll('[data-ing-price]').forEach(inp=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingPrice);
        if(row) row.price = parseFloat(inp.value)||0;
      });
      box.querySelectorAll('[data-usage-qty]').forEach(inp=>{
        const row = draft.usage.find(u=>u.itemId===inp.dataset.usageQty);
        if(row) row.qty = parseFloat(inp.value)||0;
      });
      box.querySelectorAll('[data-cost-desc]').forEach(inp=>{
        const row = draft.otherCosts.find(c=>c.id===inp.dataset.costDesc);
        if(row) row.description = inp.value;
      });
      box.querySelectorAll('[data-cost-amt]').forEach(inp=>{
        const row = draft.otherCosts.find(c=>c.id===inp.dataset.costAmt);
        if(row) row.amount = parseFloat(inp.value)||0;
      });
    }

    overlay.innerHTML = `<div class="ev-modal" id="ef-modal-box">${bodyHtml()}</div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',(ev)=>{ if(ev.target===overlay) overlay.remove(); });

    function rerender(){
      const box = document.getElementById('ef-modal-box');
      box.innerHTML = bodyHtml();
      bindEvents();
    }

    function bindUsageRowEvents(box){
      box.querySelectorAll('[data-usage-qty]').forEach(inp=>{
        inp.oninput = ()=>{
          const row = draft.usage.find(u=>u.itemId===inp.dataset.usageQty);
          if(row){ row.qty = parseFloat(inp.value)||0; row.auto=false; }
        };
        inp.addEventListener('change', rerenderSummaryOnly);
      });
      box.querySelectorAll('[data-usage-del]').forEach(btn=>{
        btn.onclick = ()=>{
          captureDraft(box);
          const row = draft.usage.find(u=>u.itemId===btn.dataset.usageDel);
          if(row) row.removed = true;
          rerender();
        };
      });
    }

    function refreshUsageList(box){
      recalcAuto();
      const listEl = box.querySelector('#ef-usage-list');
      const activeUsage = draft.usage.filter(u=>!u.removed);
      listEl.innerHTML = activeUsage.length===0
        ? '<div style="font-size:12.5px;color:var(--ink-soft);padding:6px 0;">ยังไม่มีรายการวัตถุดิบ</div>'
        : activeUsage.map(usageRowHtml).join('');
      bindUsageRowEvents(box);
      rerenderSummaryOnly();
    }

    function bindEvents(){
      const box = document.getElementById('ef-modal-box');
      box.querySelector('#ef-cancel').onclick = ()=>overlay.remove();
      const deleteBtn = box.querySelector('#ef-delete');
      if(deleteBtn) deleteBtn.onclick = ()=>confirmDeleteEvent(e, overlay);
      box.querySelector('#ef-bowls').oninput = ()=>{
        draft.bowlsSold = box.querySelector('#ef-bowls').value;
        refreshUsageList(box);
      };
      box.querySelector('#ef-cash').oninput = ()=>{ draft.cashRevenue = box.querySelector('#ef-cash').value; rerenderSummaryOnly(); };
      box.querySelector('#ef-transfer').oninput = ()=>{ draft.transferRevenue = box.querySelector('#ef-transfer').value; rerenderSummaryOnly(); };
      box.querySelectorAll('[data-ing-name]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingName);
        if(row) row.name = inp.value;
      });
      box.querySelectorAll('[data-ing-qty]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingQty);
        if(row) row.quantity = inp.value;
      });
      box.querySelectorAll('[data-ing-unit]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingUnit);
        if(row) row.unit = inp.value;
      });
      box.querySelectorAll('[data-ing-price]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.rawIngredients.find(i=>i.id===inp.dataset.ingPrice);
        if(row) row.price = parseFloat(inp.value)||0;
        rerenderSummaryOnly();
      });
      box.querySelectorAll('[data-ing-del]').forEach(btn=> btn.onclick = ()=>{
        captureDraft(box);
        draft.rawIngredients = draft.rawIngredients.filter(i=>i.id!==btn.dataset.ingDel);
        rerender();
      });
      box.querySelector('#ef-add-ing').onclick = ()=>{
        captureDraft(box);
        draft.rawIngredients.push({id:uid('ing'), name:'', quantity:'', unit:'', price:''});
        rerender();
      };
      bindUsageRowEvents(box);
      const addItemSel = box.querySelector('#ef-add-item');
      if(addItemSel) addItemSel.onchange = ()=>{
        captureDraft(box);
        const itemId = addItemSel.value;
        if(!itemId) return;
        const existing = draft.usage.find(u=>u.itemId===itemId);
        if(existing){ existing.removed=false; existing.auto=false; }
        else{ draft.usage.push({itemId, qty:0, auto:false, removed:false}); }
        rerender();
      };
      box.querySelector('#ef-add-cost').onclick = ()=>{
        captureDraft(box);
        draft.otherCosts.push({id:uid('c'), description:'', amount:0});
        rerender();
      };
      box.querySelectorAll('[data-cost-desc]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.otherCosts.find(c=>c.id===inp.dataset.costDesc);
        if(row) row.description = inp.value;
      });
      box.querySelectorAll('[data-cost-amt]').forEach(inp=> inp.oninput = ()=>{
        const row = draft.otherCosts.find(c=>c.id===inp.dataset.costAmt);
        if(row) row.amount = parseFloat(inp.value)||0;
        rerenderSummaryOnly();
      });
      box.querySelectorAll('[data-cost-del]').forEach(btn=> btn.onclick = ()=>{
        captureDraft(box);
        draft.otherCosts = draft.otherCosts.filter(c=>c.id!==btn.dataset.costDel);
        rerender();
      });

      box.querySelector('#ef-save').onclick = (ev2)=>{
        withLoading(ev2.currentTarget, 'กำลังบันทึก...', async ()=>{
          captureDraft(box);
          if(!draft.date){ toast('กรุณาระบุวันที่'); throw new Error('validation'); }
          const finalName = draft.name.trim() || defaultEventName(draft.date);
          const payload = {
            id: e?e.id:uid('ev'),
            status:'open',
            name: finalName,
            date: draft.date,
            note: draft.note.trim(),
            bowlsSold: parseFloat(draft.bowlsSold)||0,
            cashRevenue: parseFloat(draft.cashRevenue)||0,
            transferRevenue: parseFloat(draft.transferRevenue)||0,
            rawIngredients: draft.rawIngredients,
            usage: draft.usage,
            otherCosts: draft.otherCosts,
          };
          if(e){ events[events.findIndex(x=>x.id===e.id)] = payload; } else{ events.push(payload); }
          await saveEvents();
          overlay.remove();
          render();
          toast('บันทึกร่างแล้ว');
        });
      };

      box.querySelector('#ef-close-round').onclick = ()=>{
        captureDraft(box);
        if(!draft.date){ toast('กรุณาระบุวันที่'); return; }
        if(!draft.name.trim()) draft.name = defaultEventName(draft.date);
        confirmCloseRound(e, draft, overlay);
      };
    }

    function rerenderSummaryOnly(){
      const box = document.getElementById('ef-modal-box');
      const c = computeCosts();
      const summary = box.querySelector('.ev-summary');
      if(summary){
        summary.innerHTML = `
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบประกอบอาหาร</span><span class="val">฿${fmtMoney(c.ingredientsCost)}</span></div>
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบจาก Supplies</span><span class="val">฿${fmtMoney(c.suppliesCost)}</span></div>
          <div class="ev-summary-row"><span>ค่าใช้จ่ายอื่นๆ</span><span class="val">฿${fmtMoney(c.otherCost)}</span></div>
          <div class="ev-summary-row"><span>รายได้รวม (สด ฿${fmtMoney(c.cash)} + โอน ฿${fmtMoney(c.transfer)})</span><span class="val">฿${fmtMoney(c.revenue)}</span></div>
          <div class="ev-summary-total"><span>กำไรสุทธิ (ประมาณการ)</span><span class="val">฿${fmtMoney(c.profit)}</span></div>
          <div class="ev-summary-split">${partners.map(p=>`${escapeHtml(p.name)}: ฿${fmtMoney(c.profit*p.share/100)} (${p.share}%)`).join(' · ')}</div>
        `;
      }
      const totalEl = box.querySelector('.ev-revenue-total b');
      if(totalEl) totalEl.textContent = '฿'+fmtMoney(c.cash+c.transfer);
    }

    bindEvents();
    document.getElementById('ef-modal-box').querySelector('#ef-name').focus();
  }

  function confirmCloseRound(existingEvent, draft, parentOverlay){
    const overlay = document.createElement('div');
    overlay.className='ev-overlay';
    overlay.innerHTML = `
      <div class="ev-modal" style="max-width:400px;">
        <h2>ยืนยันปิดรอบขาย</h2>
        <p style="font-size:14px;color:var(--ink-soft);margin:0 0 20px;">
          ระบบจะ<b style="color:var(--ink);">ตัดสต๊อกวัตถุดิบ</b>ตามรายการที่ใช้ในรอบนี้ และล็อกตัวเลขต้นทุน/กำไรของรอบนี้ไว้
          หลังปิดรอบแล้วจะแก้ไขไม่ได้จนกว่าจะ "เปิดรอบใหม่อีกครั้ง" ต้องการดำเนินการต่อหรือไม่?
        </p>
        <div class="ev-modal-actions">
          <button class="ev-btn-secondary" id="cc-cancel">ยกเลิก</button>
          <button class="ev-btn-close" id="cc-confirm">ยืนยันปิดรอบ</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',(e)=>{ if(e.target===overlay) overlay.remove(); });
    overlay.querySelector('#cc-cancel').onclick = ()=>overlay.remove();
    overlay.querySelector('#cc-confirm').onclick = (ev)=>{
      withLoading(ev.currentTarget, 'กำลังปิดรอบ...', async ()=>{
        const state = computeLedgerState();
        const activeUsage = draft.usage.filter(u=>!u.removed && Number(u.qty||0)>0);
        const eventId = existingEvent?existingEvent.id:uid('ev');
        const suppliesCost = activeUsage.reduce((s,u)=> s+Number(u.qty)*avgCostFor(u.itemId,state), 0);
        const ingredientsCost = draft.rawIngredients.reduce((s,i)=>s+Number(i.price||0),0);
        const otherCost = draft.otherCosts.reduce((s,c)=>s+Number(c.amount||0),0);
        const totalCost = suppliesCost+ingredientsCost+otherCost;
        const cash = parseFloat(draft.cashRevenue)||0;
        const transfer = parseFloat(draft.transferRevenue)||0;
        const revenue = cash+transfer;
        const profit = revenue-totalCost;
        const bowls = parseFloat(draft.bowlsSold)||0;

        activeUsage.forEach(u=>{
          transactions.push({
            id: uid('t'), type:'out', itemId:u.itemId, date:draft.date,
            quantity:Number(u.qty), unitCost:0,
            note:`ตัดจากรอบขาย: ${draft.name.trim()}`, eventId,
          });
        });

        const payload = {
          id: eventId, status:'closed', closedAt: new Date().toISOString(),
          name: draft.name.trim(), date: draft.date, note: draft.note.trim(),
          bowlsSold: bowls, cashRevenue: cash, transferRevenue: transfer,
          rawIngredients: draft.rawIngredients,
          usage: draft.usage, otherCosts: draft.otherCosts,
          finalRevenue: revenue, finalCashRevenue: cash, finalTransferRevenue: transfer,
          finalCost: totalCost, finalProfit: profit, finalBowls: bowls,
        };
        if(existingEvent){ events[events.findIndex(x=>x.id===existingEvent.id)] = payload; }
        else{ events.push(payload); }

        await saveTx();
        await saveEvents();
        overlay.remove();
        parentOverlay.remove();
        render();
        toast('ปิดรอบขายและตัดสต๊อกเรียบร้อยแล้ว');
      });
    };
  }

  function renderClosedView(e){
    const ingredientsCost = (e.rawIngredients||[]).reduce((s,i)=>s+Number(i.price||0),0);
    const otherCost = (e.otherCosts||[]).reduce((s,c)=>s+Number(c.amount||0),0);
    const suppliesCost = e.finalCost - ingredientsCost - otherCost;
    const overlay = document.createElement('div');
    overlay.className='ev-overlay';
    overlay.innerHTML = `
      <div class="ev-modal" id="cv-modal-box">
        <h2>${escapeHtml(e.name)}</h2>
        <div class="ev-closed-banner">✓ ปิดรอบแล้วเมื่อ ${fmtDate(e.closedAt)} — สต๊อกถูกตัดเรียบร้อย ตัวเลขถูกล็อกไว้</div>
        <div class="ev-field"><label>วันที่ขาย</label><input value="${fmtDate(e.date)}" disabled></div>
        <div class="ev-row2">
          <div class="ev-field"><label>จำนวนชาม</label><input value="${fmtNum(e.finalBowls)}" disabled></div>
          <div class="ev-field"><label>ยอดขายรวม</label><input value="฿${fmtMoney(e.finalRevenue)}" disabled></div>
        </div>
        ${e.note?`<div class="ev-field"><label>หมายเหตุ</label><textarea disabled>${escapeHtml(e.note)}</textarea></div>`:''}
        <div class="ev-summary">
          <div class="ev-summary-row"><span>รับเงินสด / เงินโอน</span><span class="val">฿${fmtMoney(e.finalCashRevenue)} / ฿${fmtMoney(e.finalTransferRevenue)}</span></div>
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบประกอบอาหาร</span><span class="val">฿${fmtMoney(ingredientsCost)}</span></div>
          <div class="ev-summary-row"><span>ต้นทุนวัตถุดิบจาก Supplies</span><span class="val">฿${fmtMoney(suppliesCost)}</span></div>
          <div class="ev-summary-row"><span>ค่าใช้จ่ายอื่นๆ</span><span class="val">฿${fmtMoney(otherCost)}</span></div>
          <div class="ev-summary-total"><span>กำไรสุทธิ</span><span class="val">฿${fmtMoney(e.finalProfit)}</span></div>
          <div class="ev-summary-split">${partners.map(p=>`${escapeHtml(p.name)}: ฿${fmtMoney(e.finalProfit*p.share/100)} (${p.share}%)`).join(' · ')}</div>
        </div>
        <div class="ev-modal-actions">
          <button class="ev-btn-secondary" id="cv-cancel">ปิดหน้าต่าง</button>
          <button class="ev-btn-danger" id="cv-delete">${iconTrash()} ลบรอบนี้</button>
          <button class="ev-btn-primary" id="cv-reopen">${iconRefresh()} เปิดรอบใหม่อีกครั้ง</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',(ev)=>{ if(ev.target===overlay) overlay.remove(); });
    overlay.querySelector('#cv-cancel').onclick = ()=>overlay.remove();
    overlay.querySelector('#cv-reopen').onclick = ()=>confirmReopen(e, overlay);
    overlay.querySelector('#cv-delete').onclick = ()=>confirmDeleteEvent(e, overlay);
  }

  function confirmReopen(e, parentOverlay){
    const overlay = document.createElement('div');
    overlay.className='ev-overlay';
    overlay.innerHTML = `
      <div class="ev-modal" style="max-width:400px;">
        <h2>ยืนยันเปิดรอบใหม่</h2>
        <p style="font-size:14px;color:var(--ink-soft);margin:0 0 20px;">
          รายการตัดสต๊อกที่เกิดจากรอบ <b style="color:var(--ink);">${escapeHtml(e.name)}</b> จะถูกลบออก
          (คืนสต๊อกกลับ) และรอบนี้จะกลับไปเป็นสถานะ "กำลังขาย" เพื่อแก้ไขได้อีกครั้ง ต้องการดำเนินการต่อหรือไม่?
        </p>
        <div class="ev-modal-actions">
          <button class="ev-btn-secondary" id="rc-cancel">ยกเลิก</button>
          <button class="ev-btn-close" id="rc-confirm">ยืนยันเปิดรอบใหม่</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',(ev)=>{ if(ev.target===overlay) overlay.remove(); });
    overlay.querySelector('#rc-cancel').onclick = ()=>overlay.remove();
    overlay.querySelector('#rc-confirm').onclick = (ev)=>{
      withLoading(ev.currentTarget, 'กำลังเปิดรอบ...', async ()=>{
        transactions = transactions.filter(t=>t.eventId!==e.id);
        const idx = events.findIndex(x=>x.id===e.id);
        events[idx] = Object.assign({}, e, {status:'open', closedAt:null, finalRevenue:undefined, finalCashRevenue:undefined, finalTransferRevenue:undefined, finalCost:undefined, finalProfit:undefined, finalBowls:undefined});
        await saveTx();
        await saveEvents();
        overlay.remove();
        parentOverlay.remove();
        render();
        toast('เปิดรอบใหม่แล้ว แก้ไขได้ตามต้องการ');
      });
    };
  }

  function confirmDeleteEvent(e, parentOverlay){
    const overlay = document.createElement('div');
    overlay.className='ev-overlay';
    const hasTx = e.status==='closed';
    overlay.innerHTML = `
      <div class="ev-modal" style="max-width:400px;">
        <h2>ยืนยันการลบ</h2>
        <p style="font-size:14px;color:var(--ink-soft);margin:0 0 16px;">
          ต้องการลบรอบขาย <b style="color:var(--ink);">${escapeHtml(e.name)}</b> ใช่หรือไม่?
        </p>
        ${hasTx?`<p style="font-size:12.5px;color:var(--red);margin:-8px 0 16px;">รอบนี้ปิดแล้ว การลบจะคืนสต๊อกที่เคยตัดไปด้วย</p>`:''}
        <div class="ev-modal-actions">
          <button class="ev-btn-secondary" id="ed-cancel">ยกเลิก</button>
          <button class="ev-btn-danger" id="ed-confirm">ลบรอบขายนี้</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',(ev)=>{ if(ev.target===overlay) overlay.remove(); });
    overlay.querySelector('#ed-cancel').onclick = ()=>overlay.remove();
    overlay.querySelector('#ed-confirm').onclick = (ev)=>{
      withLoading(ev.currentTarget, 'กำลังลบ...', async ()=>{
        transactions = transactions.filter(t=>t.eventId!==e.id);
        events = events.filter(x=>x.id!==e.id);
        await saveTx();
        await saveEvents();
        overlay.remove();
        parentOverlay.remove();
        render();
        toast('ลบรอบขายแล้ว');
      });
    };
  }

  loadAll();
})();

</script>
<script>

(function(){
  var KEY = 'active_module';
  function applyModule(mod){
    document.querySelectorAll('.app-module').forEach(function(el){
      el.classList.toggle('active', el.id === 'module-'+mod);
    });
    document.querySelectorAll('.app-navbtn').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.module === mod);
    });
  }
  document.querySelectorAll('.app-navbtn').forEach(function(btn){
    btn.addEventListener('click', async function(){
      var mod = btn.dataset.module;
      applyModule(mod);
      try{ await window.storage.set(KEY, mod, false); }catch(e){}
    });
  });
  (async function(){
    try{
      var res = await window.storage.get(KEY, false);
      if(res && res.value){ applyModule(res.value); }
    }catch(e){}
  })();
})();

</script>

</body>
</html>
